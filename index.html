<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width,initial-scale=1" />
  <title>Point of Progress — Impact Map</title>

  <!-- D3 -->
  <script src="https://d3js.org/d3.v7.min.js"></script>

  <!-- Google Fonts -->
  <link href="https://fonts.googleapis.com/css2?family=DM+Sans:wght@400;500;600;700&family=DM+Serif+Display&display=swap" rel="stylesheet" />

  <style>
    :root {
      --navy:   #020244;
      --purple: #6067AF;
      --teal:   #3CBFA9;
      --grey:   #d3d6d9;
      --panel-bg: rgba(255,255,255,0.96);
      --tv-safe: 2.5%;
    }

    *, *::before, *::after { box-sizing: border-box; }

    html, body {
      height: 100%;
      margin: 0; padding: 0;
      background: #eceef2;
      font-family: 'DM Sans', 'Segoe UI', sans-serif;
      overflow: hidden;
      color: #111;
      -webkit-font-smoothing: antialiased;
    }

    /* ── MAP CONTAINER ── */
    #map-root {
      position: absolute;
      inset: 0;
      overflow: hidden;
    }
    svg {
      width: 100%; height: 100%;
      display: block;
    }

    /* ── DISTRICT PATHS ── */
    .district {
      stroke: #fff;
      stroke-width: 1.2px;
      cursor: pointer;
      transition: fill 200ms ease;
      paint-order: stroke;
    }
    .district:hover { fill: var(--teal) !important; }
    .district.focused {
      stroke: var(--navy);
      stroke-width: 2px;
    }
    .lake {
      fill: #b8d9ef;
      stroke: #8eb8d6;
      stroke-width: 0.5px;
      pointer-events: none;
    }

    /* ── DISTRICT LABELS ── */
    .district-label {
      font-family: 'DM Sans', sans-serif;
      font-size: 9px;
      font-weight: 600;
      fill: #fff;
      text-anchor: middle;
      pointer-events: none;
      user-select: none;
      text-shadow: 0 1px 2px rgba(0,0,0,0.5);
    }

    /* ── HEADER ── */
    .header {
      position: absolute;
      top: var(--tv-safe);
      left: var(--tv-safe);
      z-index: 80;
      pointer-events: none;
    }
    .header-card {
      background: var(--panel-bg);
      border-radius: 10px;
      padding: 14px 20px;
      box-shadow: 0 4px 20px rgba(2,2,68,0.12);
      border-left: 5px solid var(--teal);
    }
    .header-card h1 {
      margin: 0;
      font-family: 'DM Serif Display', serif;
      font-size: 22px;
      color: var(--navy);
      line-height: 1.2;
    }
    .header-card p {
      margin: 3px 0 0;
      font-size: 12px;
      color: #666;
      font-weight: 500;
    }

    /* ── PANELS (shared base) ── */
    .panel {
      position: absolute;
      background: var(--panel-bg);
      border-radius: 12px;
      box-shadow: 0 8px 28px rgba(2,2,68,0.12);
      overflow: hidden;
      z-index: 70;
      transition: opacity 280ms ease, transform 280ms ease;
    }
    .panel-header {
      background: var(--navy);
      padding: 14px 18px 12px;
    }
    .panel-header h2 {
      margin: 0;
      font-family: 'DM Serif Display', serif;
      font-size: 15px;
      color: #fff;
      line-height: 1.3;
    }
    .panel-header .panel-sub {
      margin: 2px 0 0;
      font-size: 10px;
      color: rgba(255,255,255,0.65);
      font-weight: 500;
    }
    .panel-body {
      padding: 12px 14px 14px;
    }

    /* ── TOTALS PANEL (bottom-left, default view) ── */
    #totals-panel {
      bottom: var(--tv-safe);
      left: var(--tv-safe);
      width: 270px;
    }
    #totals-panel.hidden {
      opacity: 0;
      transform: translateY(10px);
      pointer-events: none;
    }

    .stat-row {
      display: flex;
      align-items: center;
      justify-content: space-between;
      padding: 7px 0;
      border-bottom: 1px solid rgba(0,0,0,0.06);
    }
    .stat-row:last-child { border-bottom: none; }
    .stat-label {
      font-size: 11px;
      font-weight: 600;
      color: #444;
      display: flex;
      align-items: center;
      gap: 7px;
    }
    .stat-dot {
      width: 9px; height: 9px;
      border-radius: 50%;
      flex-shrink: 0;
    }
    .stat-value {
      font-size: 14px;
      font-weight: 700;
      color: var(--navy);
    }

    /* ── DISTRICT PANEL (shown when district selected) ── */
    #district-panel {
      top: 50%;
      left: var(--tv-safe);
      transform: translateY(-50%);
      width: 280px;
      max-height: 85vh;
      overflow-y: auto;
      opacity: 0;
      pointer-events: none;
      transition: opacity 280ms ease;
    }
    #district-panel.visible {
      opacity: 1;
      pointer-events: auto;
    }

    .district-stat-row {
      padding: 9px 0;
      border-bottom: 1px solid rgba(0,0,0,0.06);
    }
    .district-stat-row:last-child { border-bottom: none; }
    .district-stat-label {
      font-size: 10px;
      font-weight: 600;
      color: #888;
      text-transform: uppercase;
      letter-spacing: 0.5px;
      margin-bottom: 2px;
    }
    .district-stat-value {
      font-size: 20px;
      font-weight: 700;
      color: var(--navy);
      line-height: 1;
    }
    .district-stat-bar-track {
      height: 4px;
      background: #eee;
      border-radius: 2px;
      margin-top: 5px;
      overflow: hidden;
    }
    .district-stat-bar {
      height: 100%;
      border-radius: 2px;
      background: var(--teal);
      transition: width 600ms ease;
    }
    .bar-purple { background: var(--purple); }
    .bar-teal   { background: var(--teal); }
    .bar-navy   { background: var(--navy); }

    /* Not reached message */
    .not-reached {
      padding: 18px 14px;
      text-align: center;
    }
    .not-reached .nr-icon {
      font-size: 32px;
      margin-bottom: 8px;
    }
    .not-reached p {
      margin: 0;
      font-size: 13px;
      color: #888;
      line-height: 1.5;
    }
    .not-reached strong {
      display: block;
      color: var(--navy);
      font-size: 14px;
      margin-bottom: 4px;
    }

    /* ── LEGEND ── */
    #legend {
      position: absolute;
      bottom: var(--tv-safe);
      right: var(--tv-safe);
      background: var(--panel-bg);
      border-radius: 10px;
      padding: 10px 14px;
      box-shadow: 0 4px 18px rgba(2,2,68,0.10);
      z-index: 70;
      font-size: 11px;
    }
    .legend-title {
      font-weight: 700;
      color: var(--navy);
      margin-bottom: 7px;
      font-size: 11px;
      text-transform: uppercase;
      letter-spacing: 0.5px;
    }
    .legend-item {
      display: flex;
      align-items: center;
      gap: 7px;
      margin-bottom: 5px;
      color: #555;
      font-weight: 500;
    }
    .legend-swatch {
      width: 16px; height: 16px;
      border-radius: 4px;
      flex-shrink: 0;
    }

    /* ── ESC HINT ── */
    #esc-hint {
      position: absolute;
      top: var(--tv-safe);
      right: var(--tv-safe);
      background: var(--panel-bg);
      border-radius: 8px;
      padding: 8px 14px;
      font-size: 11px;
      color: #888;
      box-shadow: 0 3px 12px rgba(0,0,0,0.08);
      z-index: 70;
      opacity: 0;
      pointer-events: none;
      transition: opacity 280ms ease;
    }
    #esc-hint.visible {
      opacity: 1;
      pointer-events: auto;
    }

    /* ── LOADING ── */
    #loading {
      position: absolute;
      inset: 0;
      background: rgba(236,238,242,0.92);
      display: flex;
      align-items: center;
      justify-content: center;
      z-index: 200;
    }
    .loading-inner {
      background: #fff;
      padding: 28px 36px;
      border-radius: 14px;
      box-shadow: 0 8px 28px rgba(2,2,68,0.12);
      text-align: center;
    }
    .spinner {
      width: 36px; height: 36px;
      border: 3px solid #eee;
      border-top-color: var(--teal);
      border-radius: 50%;
      animation: spin 0.9s linear infinite;
      margin: 0 auto 14px;
    }
    .loading-inner p {
      margin: 0;
      font-weight: 600;
      color: var(--navy);
      font-size: 14px;
    }
    @keyframes spin { to { transform: rotate(360deg); } }
  </style>
</head>
<body>

  <!-- HEADER -->
  <div class="header">
    <div class="header-card">
      <h1>Point of Progress</h1>
      <p>Impact across Malawi — District overview</p>
    </div>
  </div>

  <!-- MAP ROOT -->
  <div id="map-root">
    <svg id="map-svg" preserveAspectRatio="xMidYMid meet"></svg>
  </div>

  <!-- TOTALS PANEL -->
  <div class="panel" id="totals-panel">
    <div class="panel-header">
      <h2>Point of Progress Impact</h2>
      <div class="panel-sub">Nationwide totals</div>
    </div>
    <div class="panel-body" id="totals-body">
      <!-- filled by JS -->
    </div>
  </div>

  <!-- DISTRICT PANEL -->
  <div class="panel" id="district-panel">
    <div class="panel-header">
      <h2 id="district-panel-title">District</h2>
      <div class="panel-sub" id="district-panel-sub">Impact data</div>
    </div>
    <div id="district-panel-body">
      <!-- filled by JS -->
    </div>
  </div>

  <!-- LEGEND -->
  <div id="legend">
    <div class="legend-title">Map Key</div>
    <div class="legend-item">
      <div class="legend-swatch" style="background:var(--purple)"></div>
      Districts with impact
    </div>
    <div class="legend-item">
      <div class="legend-swatch" style="background:var(--grey)"></div>
      Not yet reached
    </div>
    <div class="legend-item">
      <div class="legend-swatch" style="background:var(--teal)"></div>
      Hover / selected
    </div>
  </div>

  <!-- ESC HINT -->
  <div id="esc-hint">Press <strong>ESC</strong> to deselect district</div>

  <!-- LOADING -->
  <div id="loading">
    <div class="loading-inner">
      <div class="spinner"></div>
      <p>Loading impact data…</p>
    </div>
  </div>

<script>
(async function () {

  // ── COLUMNS we care about (order matters for display)
  const IMPACT_COLUMNS = [
    { key: "Young people Reached", label: "Young People Reached", color: "#020244" },
    { key: "Girls",                label: "Girls",                color: "#6067AF" },
    { key: "Boys",                 label: "Boys",                 color: "#3CBFA9" },
    { key: "Young Women Can Do it Clubs", label: "Can Do It Clubs", color: "#5b9bd5" },
    { key: "Self Help Groups",     label: "Self Help Groups",     color: "#e87750" },
  ];

  // Normalise district name for matching
  function norm(s) {
    return (s || '').trim().toUpperCase().replace(/\s+/g, ' ');
  }

  // Extract district name from GeoJSON feature (try common property keys)
  function featName(feat) {
    const p = feat.properties || {};
    for (const k of ['NAME_1','NAME','DISTRICT','Dist_Name','DISTRICT NAME','DISTNAME','DIST_NAME','district','District','name']) {
      if (p[k] && typeof p[k] === 'string' && p[k].trim()) return p[k];
    }
    return '';
  }

  // Format numbers with commas
  function fmt(n) {
    return Number(n).toLocaleString();
  }

  // ── DOM refs
  const mapRoot    = document.getElementById('map-root');
  const totalPanel = document.getElementById('totals-panel');
  const distPanel  = document.getElementById('district-panel');
  const escHint    = document.getElementById('esc-hint');
  const loading    = document.getElementById('loading');

  // ── SVG setup
  const svg = d3.select('#map-svg');
  let W = mapRoot.clientWidth, H = mapRoot.clientHeight;
  svg.attr('viewBox', `0 0 ${W} ${H}`);
  const mapGroup = svg.append('g').attr('id', 'mapGroup');

  // ── Projection (centred on Malawi)
  const projection = d3.geoMercator()
    .center([34.3015, -13.2543])
    .scale(Math.min(W, H) * 6.5)
    .translate([W / 2, H / 2]);
  const path = d3.geoPath().projection(projection);

  // ── Zoom
  const zoom = d3.zoom()
    .scaleExtent([1, 14])
    .on('zoom', e => mapGroup.attr('transform', e.transform));
  svg.call(zoom);

  // ── State
  let impactData = {};   // key: NORMALISED district name → { col: value, ... }
  let geoData    = null;
  let districtSel = null;
  let labelSel    = null;
  let selectedId  = null;

  // ─────────────────────────────────────────────
  //  LOAD DATA
  // ─────────────────────────────────────────────
  try {
    loading.style.display = 'flex';

    const [geo, csvRows] = await Promise.all([
      d3.json('malawi_districts.geojson'),
      d3.csv('data.csv')
    ]);

    geoData = geo;

    // Parse CSV
    let totals = {};
    IMPACT_COLUMNS.forEach(c => totals[c.key] = 0);

    csvRows.forEach(row => {
      const distKey = norm(row['District'] || row['DISTRICT'] || '');
      if (!distKey) return;

      const record = {};
      IMPACT_COLUMNS.forEach(c => {
        const raw = (row[c.key] || '0').toString().replace(/,/g, '').trim();
        record[c.key] = parseInt(raw, 10) || 0;
        totals[c.key] += record[c.key];
      });
      impactData[distKey] = record;
    });

    // ── Compute max per column for bar scaling
    const maxVals = {};
    IMPACT_COLUMNS.forEach(c => {
      maxVals[c.key] = Math.max(...Object.values(impactData).map(d => d[c.key] || 0));
    });

    // ── Render totals panel
    renderTotalsPanel(totals);

    // ── Draw map
    drawMap(maxVals);

    loading.style.display = 'none';

  } catch (err) {
    console.error('Failed to load data:', err);
    loading.querySelector('p').textContent = 'Error loading data. Check console.';
  }

  // ─────────────────────────────────────────────
  //  RENDER TOTALS PANEL
  // ─────────────────────────────────────────────
  function renderTotalsPanel(totals) {
    const body = document.getElementById('totals-body');
    body.innerHTML = '';
    IMPACT_COLUMNS.forEach(col => {
      const row = document.createElement('div');
      row.className = 'stat-row';
      row.innerHTML = `
        <span class="stat-label">
          <span class="stat-dot" style="background:${col.color}"></span>
          ${col.label}
        </span>
        <span class="stat-value">${fmt(totals[col.key])}</span>
      `;
      body.appendChild(row);
    });
  }

  // ─────────────────────────────────────────────
  //  DRAW MAP
  // ─────────────────────────────────────────────
  function drawMap(maxVals) {
    const features = geoData.features || [];

    function isLake(f) {
      const p = f.properties || {};
      const t = (p.TYPE || p.type || '').toLowerCase();
      const n = (p.NAME || p.NAME_1 || p.name || '').toLowerCase();
      return t.includes('lake') || n.includes('lake');
    }

    const lakes     = features.filter(isLake);
    const districts = features.filter(f => !isLake(f));

    // Lakes
    mapGroup.append('g').attr('class', 'lakes')
      .selectAll('path')
      .data(lakes)
      .enter()
      .append('path')
      .attr('class', 'lake')
      .attr('d', path);

    // Districts
    districtSel = mapGroup.append('g').attr('class', 'districts')
      .selectAll('path')
      .data(districts)
      .enter()
      .append('path')
      .attr('class', 'district')
      .attr('d', path)
      .attr('fill', d => districtFill(d))
      .on('mouseover', function (event, d) {
        const id = distId(d);
        if (selectedId !== id) {
          d3.select(this).attr('fill', '#3CBFA9');
        }
      })
      .on('mouseout', function (event, d) {
        const id = distId(d);
        if (selectedId !== id) {
          d3.select(this).attr('fill', districtFill(d));
        }
      })
      .on('click', function (event, d) {
        event.stopPropagation();
        const id = distId(d);
        if (selectedId === id) {
          resetView();
        } else {
          selectDistrict(d, this);
        }
      });

    // Labels
    labelSel = mapGroup.append('g').attr('class', 'district-labels')
      .selectAll('text')
      .data(districts)
      .enter()
      .append('text')
      .attr('class', 'district-label')
      .attr('transform', d => {
        const [cx, cy] = path.centroid(d);
        return `translate(${cx},${cy})`;
      })
      .attr('dy', '0.35em')
      .text(d => {
        const name = featName(d).trim();
        return name.length > 7 ? name.substring(0, 3).toUpperCase() : name.toUpperCase();
      });

    // Click on SVG background → reset
    svg.on('click', (event) => {
      if (event.target.tagName.toLowerCase() === 'svg') resetView();
    });

    // Resize handler
    window.addEventListener('resize', () => {
      W = mapRoot.clientWidth; H = mapRoot.clientHeight;
      svg.attr('viewBox', `0 0 ${W} ${H}`);
      projection.scale(Math.min(W, H) * 6.5).translate([W / 2, H / 2]);
      svg.selectAll('path').attr('d', path);
      labelSel.attr('transform', d => {
        const [cx, cy] = path.centroid(d);
        return `translate(${cx},${cy})`;
      });
    });

    // ESC key
    document.addEventListener('keydown', e => {
      if (e.key === 'Escape') resetView();
    });

    // Pass maxVals to select for bars
    window.__maxVals = maxVals;
  }

  // ─────────────────────────────────────────────
  //  HELPERS
  // ─────────────────────────────────────────────
  function distId(d) {
    const p = d.properties || {};
    return p.id || p.NAME_1 || p.DISTRICT || p.name || JSON.stringify(p).slice(0, 40);
  }

  function districtFill(d) {
    const key = norm(featName(d));
    return impactData[key] ? '#6067AF' : '#d3d6d9';
  }

  // ─────────────────────────────────────────────
  //  SELECT DISTRICT
  // ─────────────────────────────────────────────
  function selectDistrict(feat, el) {
    selectedId = distId(feat);

    // Zoom to district
    const [[x0, y0], [x1, y1]] = path.bounds(feat);
    const dx = x1 - x0, dy = y1 - y0;
    const cx = (x0 + x1) / 2, cy = (y0 + y1) / 2;
    const scale = Math.max(1, Math.min(12, 0.8 / Math.max(dx / (W * 0.55), dy / H)));
    const tx = W * 0.62 - scale * cx;
    const ty = H / 2   - scale * cy;

    svg.transition().duration(900).call(
      zoom.transform,
      d3.zoomIdentity.translate(tx, ty).scale(scale)
    );

    // Highlight
    districtSel
      .attr('fill', d => distId(d) === selectedId ? '#3CBFA9' : districtFill(d))
      .classed('focused', d => distId(d) === selectedId);

    // Update panels
    const rawName  = featName(feat);
    const normName = norm(rawName);
    const data     = impactData[normName];

    renderDistrictPanel(rawName, data, window.__maxVals);

    // Toggle panel visibility
    totalPanel.classList.add('hidden');
    distPanel.classList.add('visible');
    escHint.classList.add('visible');
  }

  // ─────────────────────────────────────────────
  //  RENDER DISTRICT PANEL
  // ─────────────────────────────────────────────
  function renderDistrictPanel(name, data, maxVals) {
    document.getElementById('district-panel-title').textContent = name || 'District';

    const body = document.getElementById('district-panel-body');

    if (!data) {
      document.getElementById('district-panel-sub').textContent = 'No impact recorded';
      body.innerHTML = `
        <div class="not-reached">
          <div class="nr-icon">🗺️</div>
          <p><strong>Area not reached yet</strong>This district has not been part of the programme so far.</p>
        </div>`;
      return;
    }

    document.getElementById('district-panel-sub').textContent = 'Programme impact breakdown';

    const totalReached = data['Young people Reached'] || 0;
    body.innerHTML = '';

    const bodyDiv = document.createElement('div');
    bodyDiv.className = 'panel-body';

    IMPACT_COLUMNS.forEach((col, i) => {
      const val  = data[col.key] || 0;
      const max  = maxVals ? (maxVals[col.key] || 1) : 1;
      const pct  = Math.round((val / max) * 100);

      const barClass = i === 0 ? 'bar-navy' : i === 1 ? 'bar-purple' : i === 2 ? 'bar-teal' : 'bar-purple';

      const row = document.createElement('div');
      row.className = 'district-stat-row';
      row.innerHTML = `
        <div class="district-stat-label">${col.label}</div>
        <div class="district-stat-value">${fmt(val)}</div>
        <div class="district-stat-bar-track">
          <div class="district-stat-bar ${barClass}" style="width:${pct}%"></div>
        </div>`;
      bodyDiv.appendChild(row);
    });

    body.appendChild(bodyDiv);
  }

  // ─────────────────────────────────────────────
  //  RESET VIEW
  // ─────────────────────────────────────────────
  function resetView() {
    selectedId = null;

    svg.transition().duration(700).call(zoom.transform, d3.zoomIdentity);

    districtSel
      .attr('fill', d => districtFill(d))
      .classed('focused', false);

    totalPanel.classList.remove('hidden');
    distPanel.classList.remove('visible');
    escHint.classList.remove('visible');
  }

})();
</script>

</body>
</html>
